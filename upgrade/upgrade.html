<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unlock Unlimited Jargon Translations</title>
  <link rel="stylesheet" href="upgrade.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="light-ray"></div>

  <div class="card-container">
    <div class="card-glow"></div>
    <div class="card-grid"></div>

    <div class="progress-bars">
      <div class="bar active"></div>
      <div class="bar active"></div>
      <div class="bar active"></div>
    </div>

    <!-- Main Content State -->
    <div id="main-state">
      <div class="icon-wrapper">
        <div class="icon-layer shadow"></div>
        <div class="icon-layer folder">
          <img src="../icons/icon-128.png" width="36" height="36" style="border-radius: 8px;" alt="Logo">
        </div>
      </div>

      <h1>Unlock Premium</h1>
      <p class="subtitle">You've reached your free limit. Share the<br>extension to get unlimited translations.</p>

      <div class="options-list">
        <!-- Step 1: Share on X -->
        <button id="tweet-btn" class="option-row">
          <div class="option-icon blue-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </div>
          <div class="option-text">
            <span class="option-title">Share on X</span>
            <span class="option-desc">Post a pre-drafted tweet</span>
          </div>
          <div class="option-action">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </div>
        </button>

        <!-- Step 1b: Share on LinkedIn -->
        <button id="linkedin-btn" class="option-row">
          <div class="option-icon blue-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </div>
          <div class="option-text">
            <span class="option-title">Share on LinkedIn</span>
            <span class="option-desc">Post a pre-drafted update</span>
          </div>
          <div class="option-action">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </div>
        </button>

        <!-- Step 2: Verify -->
        <div class="option-row input-row">
          <div class="option-icon blue-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
          </div>
          <div class="option-text option-input-wrapper">
            <span class="option-title">Verify URL</span>
            <input type="url" id="tweet-url" placeholder="Paste link here..." autocomplete="off" spellcheck="false">
          </div>
          <button id="verify-btn" class="option-action verify-action" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </button>
        </div>
      </div>
      
      <div id="error-message" class="error-message"></div>
    </div>

    <!-- Success State -->
    <div id="success-state" class="success-state" style="display: none;">
      <div class="icon-wrapper success-wrapper">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h1>Premium Unlocked!</h1>
      <p class="subtitle">Thank you for sharing! You now have<br>unlimited access to the translator.</p>
    </div>
  </div>

  <div class="upgrade-footer">
    Made with no BS by <a href="https://felixobinna.com" target="_blank" rel="noopener noreferrer">Felix Obinna</a>
  </div>

  <script src="upgrade.js"></script>
</body>
</html>
