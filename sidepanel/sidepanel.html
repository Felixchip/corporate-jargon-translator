<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corporate Jargon Translator</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-left">
        <h1>Jargon Translator</h1>
      </div>
    </header>

    <div class="translations-list" id="translationsList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎙️</div>
        <h2>Ready to translate</h2>
        <p>Start listening to detect and translate corporate jargon in real-time.</p>
        <button class="btn btn-primary btn-listen btn-empty" id="listenBtnEmpty">
          <svg class="mic-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
          <svg class="stop-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display: none;">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
          <span class="btn-label">Start Listening</span>
        </button>
      </div>
    </div>

    <div class="controls" style="display: none;">
      <button class="btn btn-primary btn-listen btn-bottom" id="listenBtnBottom">
        <svg class="mic-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <svg class="stop-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display: none;">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
        <span class="btn-label">Start Listening</span>
      </button>
      <button class="btn btn-summarize btn-bottom" id="summarizeBtn" style="display: none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Summarize
      </button>
    </div>

    <div class="modal-overlay" id="summaryModal" style="display: none;">
      <div class="modal summary-modal">
        <div class="modal-header">
          <h2>Translation Summary</h2>
          <button class="modal-close" id="summaryClose">&times;</button>
        </div>
        <div class="modal-body">
          <div class="summary-content" id="summaryContent"></div>
          <button class="btn btn-primary btn-copy" id="copyBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy to Clipboard
          </button>
          <div class="copy-status" id="copyStatus">Copied!</div>
        </div>
      </div>
    </div>

    <div class="error-banner" id="errorBanner" style="display: none;">
      <span class="error-text" id="errorText"></span>
      <button class="error-close" id="errorClose">&times;</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
