<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Microphone Permission</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'%3E%3Cpath fill-rule='evenodd' clip-rule='evenodd' d='M99.7565 32.3521C56.5749 32.3521 21.5691 67.3579 21.5691 110.539C21.5691 207.6 150.983 226.472 150.983 226.472V188.727H159.071C202.253 188.727 237.258 153.721 237.258 110.539C237.258 67.3579 202.253 32.3521 159.071 32.3521H99.7565Z' fill='%2300BFFF'/%3E%3Cpath d='M180.12 151.21C172 149.5 165.468 142.196 162.5 135.5C161.602 133.569 160.172 127.576 159 121.5C156.861 110.525 155.5 109 155.5 109C153.912 109 140.145 114.671 134 117.5C130.754 118.95 122.627 123.337 116 127C102.538 134.456 98.0384 134.779 93 132.5C87.4058 130.083 81.5 121 82.7026 113.083C82.9805 111.355 84.6337 105.006 86.5 99C87.7957 94.83 88.5 93.5 88.5 93.5C88.5 93.5 88.0258 93.8405 78.5 101.5C65.7974 111.716 56.5195 117.925 53 120C47.7532 123.107 39.9868 120.025 37.5 114.5C36.12 111.323 33.5 107 38.5 101C39.0511 100.171 47.1642 93.0437 56 86.0001C64.7663 79.0259 77.4943 68.8806 81.5 65.5001C92.6837 56.317 99.5 56.0002 105 60C106.966 61.4294 109.309 66.0632 109.309 68.0637C109.791 69.0586 110.62 70.2349 112.482 71.7538C114.07 72.9949 116 76.3044 116 78.0001C117 83.0001 116.5 85.0001 115 93.0001C114.24 97.0526 113.5 99.0001 113.5 99.0001C113.5 99.0001 119.443 96.2417 126 93.0001C137.804 87.0633 145.494 83.7923 151.5 82.0001C158.544 79.8606 167.878 81.7211 172.5 86.0001C177.677 90.7653 180.532 99.088 183.5 116C184.741 123.386 186 125.5 186 125.5C186.5 126 188.545 125.659 194 122C198.899 118.754 200 118 203 117.5C206.659 116.89 209.5 117 213.5 121C216.26 123.83 218.386 129.933 215.5 135C212.937 139.5 206.335 143.342 199.5 147C191.697 151.14 186.411 152.534 180.12 151.21Z' fill='black'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="microphone.css">
</head>
<body>
  <div class="light-ray"></div>
  <div class="card-container">
    <div class="card-glow"></div>
    <div class="card-grid"></div>

    <!-- Main Content State -->
    <div id="main-state">
      <div class="icon-wrapper">
        <div class="icon-layer shadow"></div>
        <div class="icon-layer folder">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" x2="12" y1="19" y2="22"/>
            <line x1="8" x2="16" y1="22" y2="22"/>
          </svg>
        </div>
      </div>

      <h1>Microphone Access</h1>
      <p class="subtitle">Cut the BS needs<br>your microphone to listen to meetings.</p>

      <div class="options-list">
        <!-- Allow button -->
        <button id="allow-btn" class="option-row">
          <div class="option-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#34d4a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
              <path d="m9 12 2 2 4-4"></path>
            </svg>
          </div>
          <div class="option-text">
            <span class="option-title">Allow Microphone</span>
            <span class="option-desc">Grant access to start translating</span>
          </div>
          <div class="option-action">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </div>
        </button>
      </div>
      
      <div id="error-message" class="error-message"></div>
    </div>

    <!-- Success State -->
    <div id="success-state" class="success-state" style="display: none;">
      <div class="icon-wrapper success-wrapper">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h1>Access Granted!</h1>
      <p class="subtitle">Your microphone is ready.<br>You can close this tab and return to your meeting.</p>
    </div>
  </div>

  <div class="upgrade-footer">
    Made with no BS by <a href="https://felixobinna.com" target="_blank" rel="noopener noreferrer">Felix Obinna</a>
  </div>

  <script src="microphone.js"></script>
</body>
</html>
