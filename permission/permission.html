<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corporate Jargon Translator - Mic Permission</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 400px;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 24px; margin-bottom: 12px; color: #fff; }
    p { color: #888; margin-bottom: 24px; line-height: 1.5; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #00d9ff, #0099cc);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .status { margin-top: 20px; font-size: 14px; min-height: 20px; }
    .status.success { color: #2ed573; }
    .status.error { color: #ff4757; }
    .status.listening { color: #ffa502; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎙️</div>
    <h1>Microphone Permission</h1>
    <p>Click the button below to grant microphone access. This is needed to listen to meetings and translate corporate jargon in real-time.</p>
    <button class="btn" id="grantBtn">Grant Microphone Access</button>
    <div class="status" id="status"></div>
  </div>
  <script src="permission.js"></script>
</body>
</html>
